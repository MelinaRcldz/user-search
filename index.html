<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de usuarios</title>
  </head>
  <body>
    <main>
      <h1>Buscador de usuarios</h1>

      <label for="searchInput">Buscar usuario por nombre</label>
      <input
        id="searchInput"
        type="text"
        placeholder="Ej: Leanne"
      />

      <p id="status"></p>
      <ul id="userList"></ul>

      <section>
        <h2>Primeros 5 posts</h2>

        <button id="getPostsButton">
            Cargar posts
        </button>

        <ul id="postsList"></ul>
      </section>

      <section>
        <h2>Usuarios y Posts</h2>

        <button id="getUsersAndPostsButton">
            Cargar usuarios y posts
        </button>

        <ul id="usersAndPostsList"></ul>
      </section>

      <section>
        <h2>Crear Post</h2>

        <form id="createPostForm">
            <label for="postAuthor">Autor</label>
            <input
                id="postAuthor"
                name="author"
                type="text"
                placeholder="Nombre del autor"
                required
            />
            <label for="postTitle">Título del post</label>
            <input
                id="postTitle"
                name="title"
                type="text"
                placeholder="Titulo del post"
                required
            />
            <label for="postBody">Contenido del post</label>
            <textarea
                id="postBody"
                name="body"
                placeholder="Contenido del post"
                required
            ></textarea>

            <button type="submit">
                Crear Post
            </button>
        </form>

        <article id="createdPost"></article>
      </section>

    </main>
    <script src="app.js"></script>
  </body>
</html>
