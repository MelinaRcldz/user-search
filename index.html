<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de usuarios</title>
  </head>
  <body>
    <main>
      <h1>Buscador de usuarios</h1>

      <label for="searchInput">Buscar usuario por nombre</label>
      <input
        id="searchInput"
        type="text"
        placeholder="Ej: Leanne"
      />

      <p id="status"></p>
      <ul id="userList"></ul>

      <section>
        <h2>Primeros 5 posts</h2>

        <button id="getPostsButton">
            Cargar posts
        </button>

        <ul id="postsList"></ul>
      </section>
      
    </main>
    <script src="app.js"></script>
  </body>
</html>
